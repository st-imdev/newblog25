---
layout: null  # No site layout to avoid inheritance
permalink: /new-post
---

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Post</title>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      background: white;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #333;
      overflow: hidden;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem 1rem;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: normal;
      margin: 0;
      text-align: center;
      color: #222;
    }

    .input-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    input {
      padding: 0.75rem;
      border: 1px solid #eee;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      background: white;
      flex: 1;
      max-width: 300px;
    }

    input:focus {
      outline: none;
      border-color: #ddd;
    }

    .editor-wrapper {
      flex: 1;
      border: 1px solid #eee;
      border-radius: 4px;
      overflow: hidden;
    }

    #editor {
      height: 100%;
    }

    .ql-container {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 18px;
      line-height: 1.6;
    }

    .ql-editor {
      padding: 2rem;
      min-height: 400px;
    }

    .ql-toolbar {
      border-bottom: 1px solid #eee;
      background: white;
    }

    .publish-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .publish-btn {
      background: white;
      color: #333;
      border: 1px solid #ddd;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .publish-btn:hover {
      background: #f8f8f8;
    }

    .publish-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 4px;
      display: none;
    }

    .status-success {
      background: #f0fff0;
      color: #228b22;
    }

    .status-error {
      background: #fff0f0;
      color: #8b2222;
    }

    .status-loading {
      background: #f0f8ff;
      color: #22228b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>New Post</h1>
      <div class="input-group">
        <input type="text" id="title" placeholder="Title">
        <input type="text" id="tags" placeholder="Tags (comma-separated)">
      </div>
    </div>
    <div class="editor-wrapper">
      <div id="editor"></div>
    </div>
    <div class="publish-group">
      <input type="password" id="secret" placeholder="Secret">
      <button class="publish-btn" id="publish-btn">Publish</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  <script>
    const quill = new Quill('#editor', {
      theme: 'snow',
      placeholder: 'Start writing...',
      modules: {
        toolbar: [
          ['bold', 'italic', 'underline'],
          ['link', 'blockquote', 'code-block'],
          [{ list: 'ordered' }, { list: 'bullet' }],
          [{ header: [1, 2, 3, false] }]
        ]
      }
    });

    const titleEl = document.getElementById('title');
    const tagsEl = document.getElementById('tags');
    const secretEl = document.getElementById('secret');
    const publishBtn = document.getElementById('publish-btn');
    const statusEl = document.getElementById('status');

    publishBtn.addEventListener('click', async () => {
      const title = titleEl.value.trim();
      const tags = tagsEl.value.trim();
      const content = quill.root.innerHTML.trim();
      const secret = secretEl.value.trim();

      if (!title || !content || !secret) {
        showStatus('Please fill in title, content, and secret', 'error');
        return;
      }

      publishBtn.disabled = true;
      showStatus('Publishing...', 'loading');

      try {
        const response = await fetch('/.netlify/functions/add-post', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-secret': secret
          },
          body: JSON.stringify({ title, tags, content })
        });

        const result = await response.text();

        if (response.ok) {
          showStatus('Published successfully!', 'success');
          titleEl.value = '';
          tagsEl.value = '';
          secretEl.value = '';
          quill.setContents([]);
        } else {
          showStatus(`Error: ${result}`, 'error');
        }
      } catch (error) {
        showStatus(`Error: ${error.message}`, 'error');
      } finally {
        publishBtn.disabled = false;
      }
    });

    function showStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = `status status-${type}`;
      statusEl.style.display = 'block';
      setTimeout(() => { statusEl.style.display = 'none'; }, 5000);
    }
  </script>
</body>
</html>
