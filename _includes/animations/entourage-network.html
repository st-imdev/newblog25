<!-- Entourage Collective Intelligence Animation -->
<div id="entourage-animation" style="margin: 2rem 0 1rem 0; position: relative; width: 100%; padding-bottom: 50%; overflow: hidden;">
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Entourage collective intelligence animation - redesigned
  const container = d3.select("#entourage-animation > div");
  if (!container.node()) return;
  
  const rect = container.node().getBoundingClientRect();
  const width = rect.width;
  const height = rect.height;
  
  const svg = container.append("svg")
    .attr("width", width)
    .attr("height", height)
    .attr("viewBox", `0 0 ${width} ${height}`)
    .attr("preserveAspectRatio", "xMidYMid meet");
  
  // Create a more dynamic network visualization
  const nodes = [];
  const links = [];
  const nodeCount = 20;
  const clusterCount = 3;
  
  // Create clusters of agents
  for (let cluster = 0; cluster < clusterCount; cluster++) {
    const clusterX = (cluster + 1) * width / (clusterCount + 1);
    const clusterY = height / 2 + (Math.random() - 0.5) * height * 0.3;
    
    for (let i = 0; i < nodeCount / clusterCount; i++) {
      const angle = (i / (nodeCount / clusterCount)) * 2 * Math.PI;
      const radius = 40 + Math.random() * 30;
      
      nodes.push({
        id: nodes.length,
        x: clusterX + radius * Math.cos(angle),
        y: clusterY + radius * Math.sin(angle),
        vx: 0,
        vy: 0,
        cluster: cluster,
        knowledge: Math.random() * 0.5 + 0.3,
        discoveries: 0
      });
    }
  }
  
  // Create initial connections within clusters
  nodes.forEach((node, i) => {
    nodes.forEach((other, j) => {
      if (i < j && node.cluster === other.cluster) {
        const distance = Math.sqrt(Math.pow(node.x - other.x, 2) + Math.pow(node.y - other.y, 2));
        if (distance < 80 && Math.random() > 0.5) {
          links.push({
            source: node,
            target: other,
            strength: Math.random() * 0.5 + 0.5
          });
        }
      }
    });
  });
  
  // Draw links
  const linkElements = svg.append("g")
    .selectAll("line")
    .data(links)
    .enter().append("line")
    .attr("stroke", "var(--color-tx-muted)")
    .attr("stroke-width", d => d.strength)
    .attr("opacity", 0.2);
  
  // Draw nodes
  const nodeElements = svg.append("g")
    .selectAll("circle")
    .data(nodes)
    .enter().append("circle")
    .attr("r", 5)
    .attr("fill", "var(--color-action)")
    .attr("opacity", d => d.knowledge);
  
  // Knowledge particles group
  const particlesGroup = svg.append("g");
  
  // Update positions
  function updatePositions() {
    linkElements
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
    
    nodeElements
      .attr("cx", d => d.x)
      .attr("cy", d => d.y);
  }
  
  // Create knowledge flow
  function createKnowledgeFlow() {
    // Pick a random link
    if (links.length === 0) return;
    const link = links[Math.floor(Math.random() * links.length)];
    
    // Create particle
    const particle = particlesGroup.append("circle")
      .attr("r", 2)
      .attr("fill", "var(--color-action)")
      .attr("cx", link.source.x)
      .attr("cy", link.source.y)
      .attr("opacity", 0.8);
    
    // Animate to target
    particle.transition()
      .duration(1500)
      .attr("cx", link.target.x)
      .attr("cy", link.target.y)
      .on("end", function() {
        // Transfer knowledge
        link.target.knowledge = Math.min(link.target.knowledge + 0.05, 1);
        link.strength = Math.min(link.strength + 0.1, 2);
        
        // Update visuals
        nodeElements
          .filter(d => d.id === link.target.id)
          .transition()
          .duration(300)
          .attr("opacity", d => d.knowledge)
          .attr("r", 7)
          .transition()
          .duration(300)
          .attr("r", 5);
        
        linkElements
          .filter(d => d === link)
          .transition()
          .duration(300)
          .attr("stroke-width", d => d.strength);
        
        particle.remove();
      });
  }
  
  // Create discovery burst
  function createDiscovery() {
    const node = nodes[Math.floor(Math.random() * nodes.length)];
    node.discoveries++;
    
    // Create burst effect
    const burst = svg.append("g");
    
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * 2 * Math.PI;
      const line = burst.append("line")
        .attr("x1", node.x)
        .attr("y1", node.y)
        .attr("x2", node.x)
        .attr("y2", node.y)
        .attr("stroke", "var(--color-action)")
        .attr("stroke-width", 1)
        .attr("opacity", 0.6);
      
      line.transition()
        .duration(1000)
        .attr("x2", node.x + 30 * Math.cos(angle))
        .attr("y2", node.y + 30 * Math.sin(angle))
        .attr("opacity", 0)
        .on("end", function() {
          line.remove();
        });
    }
    
    // Create new cross-cluster connections
    if (node.discoveries > 2 && Math.random() > 0.5) {
      const otherCluster = nodes.filter(n => n.cluster !== node.cluster);
      if (otherCluster.length > 0) {
        const target = otherCluster[Math.floor(Math.random() * otherCluster.length)];
        const newLink = {
          source: node,
          target: target,
          strength: 0.3
        };
        links.push(newLink);
        
        // Add new link element
        svg.select("g").insert("line", ":first-child")
          .datum(newLink)
          .attr("stroke", "var(--color-action)")
          .attr("stroke-width", 2)
          .attr("opacity", 0)
          .attr("x1", node.x)
          .attr("y1", node.y)
          .attr("x2", target.x)
          .attr("y2", target.y)
          .transition()
          .duration(1000)
          .attr("opacity", 0.3)
          .attr("stroke", "var(--color-tx-muted)")
          .attr("stroke-width", newLink.strength);
      }
    }
  }
  
  // Gentle drift animation
  function drift() {
    nodes.forEach(node => {
      node.vx += (Math.random() - 0.5) * 0.2;
      node.vy += (Math.random() - 0.5) * 0.2;
      node.vx *= 0.98; // Damping
      node.vy *= 0.98;
      
      node.x += node.vx;
      node.y += node.vy;
      
      // Keep within bounds
      node.x = Math.max(20, Math.min(width - 20, node.x));
      node.y = Math.max(20, Math.min(height - 20, node.y));
    });
    
    updatePositions();
  }
  
  // Initialize positions
  updatePositions();
  
  // Start animations
  const flowInterval = setInterval(createKnowledgeFlow, 800);
  const discoveryInterval = setInterval(createDiscovery, 3000);
  const driftInterval = setInterval(drift, 50);
  
  // Initial burst of activity
  for (let i = 0; i < 3; i++) {
    setTimeout(createKnowledgeFlow, i * 300);
  }
  
  // Clean up
  window.addEventListener('beforeunload', () => {
    clearInterval(flowInterval);
    clearInterval(discoveryInterval);
    clearInterval(driftInterval);
  });
  
  // Handle resize
  window.addEventListener('resize', () => {
    const newRect = container.node().getBoundingClientRect();
    svg.attr("width", newRect.width)
       .attr("height", newRect.height)
       .attr("viewBox", `0 0 ${newRect.width} ${newRect.height}`);
  });
});
</script>
