<!-- Entourage Collective Intelligence Animation -->
<div id="entourage-animation" style="margin: 2rem 0 1rem 0; height: 160px; position: relative;"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Entourage collective intelligence animation
  const container = d3.select("#entourage-animation");
  if (!container.node()) return;
  
  const width = container.node().getBoundingClientRect().width;
  const height = 160;
  
  const svg = container.append("svg")
    .attr("width", width)
    .attr("height", height);
  
  // Central shared memory
  const centerX = width / 2;
  const centerY = height / 2;
  const memoryRadius = 25;
  
  // Create gradient for shared memory
  const gradient = svg.append("defs")
    .append("radialGradient")
    .attr("id", "memoryGradient");
  
  gradient.append("stop")
    .attr("offset", "0%")
    .attr("stop-color", "var(--color-primary)")
    .attr("stop-opacity", 0.3);
  
  gradient.append("stop")
    .attr("offset", "100%")
    .attr("stop-color", "var(--color-primary)")
    .attr("stop-opacity", 0.1);
  
  // Draw central shared memory
  const memoryGroup = svg.append("g");
  
  memoryGroup.append("circle")
    .attr("cx", centerX)
    .attr("cy", centerY)
    .attr("r", memoryRadius)
    .attr("fill", "url(#memoryGradient)")
    .attr("stroke", "var(--color-primary)")
    .attr("stroke-width", 1)
    .attr("opacity", 0.8);
  
  // Memory text
  memoryGroup.append("text")
    .attr("x", centerX)
    .attr("y", centerY + 4)
    .attr("text-anchor", "middle")
    .attr("font-family", "monospace")
    .attr("font-size", "11px")
    .attr("fill", "var(--color-tx-normal)")
    .attr("opacity", 0.9)
    .text("MEMORY");
  
  // Create agents around the memory
  const agentCount = 8;
  const agentRadius = Math.min(width * 0.35, 100);
  const agents = [];
  
  for (let i = 0; i < agentCount; i++) {
    const angle = (i / agentCount) * 2 * Math.PI - Math.PI / 2;
    const x = centerX + agentRadius * Math.cos(angle);
    const y = centerY + agentRadius * Math.sin(angle);
    
    agents.push({
      id: i,
      x: x,
      y: y,
      angle: angle,
      knowledge: Math.random() * 0.3 + 0.2, // Initial knowledge level
      active: false
    });
  }
  
  // Draw agents
  const agentGroups = svg.selectAll("g.agent")
    .data(agents)
    .enter().append("g")
    .attr("class", "agent");
  
  agentGroups.append("circle")
    .attr("cx", d => d.x)
    .attr("cy", d => d.y)
    .attr("r", 8)
    .attr("fill", "var(--color-tx-muted)")
    .attr("opacity", d => d.knowledge);
  
  // Create knowledge transfer animation
  function transferKnowledge() {
    // Pick random agent to learn
    const learner = agents[Math.floor(Math.random() * agents.length)];
    // Pick random agent to share (not the same)
    let teacher;
    do {
      teacher = agents[Math.floor(Math.random() * agents.length)];
    } while (teacher.id === learner.id);
    
    // Create path from teacher to memory to learner
    const path = svg.append("path")
      .attr("d", `M${teacher.x},${teacher.y} Q${centerX},${centerY} ${learner.x},${learner.y}`)
      .attr("fill", "none")
      .attr("stroke", "none");
    
    // Create knowledge particle
    const particle = svg.append("circle")
      .attr("r", 3)
      .attr("fill", "var(--color-primary)")
      .attr("opacity", 0.8);
    
    // Animate along path
    particle.transition()
      .duration(2000)
      .attrTween("transform", function() {
        const length = path.node().getTotalLength();
        return function(t) {
          const point = path.node().getPointAtLength(t * length);
          return `translate(${point.x},${point.y})`;
        };
      })
      .on("end", function() {
        // Update learner's knowledge
        learner.knowledge = Math.min(learner.knowledge + 0.1, 1);
        
        // Update agent visual
        agentGroups.selectAll("circle")
          .filter(d => d.id === learner.id)
          .transition()
          .duration(500)
          .attr("opacity", d => d.knowledge)
          .attr("r", 10)
          .transition()
          .duration(500)
          .attr("r", 8);
        
        // Clean up
        particle.remove();
        path.remove();
      });
  }
  
  // Create discovery animation
  function makeDiscovery() {
    const agent = agents[Math.floor(Math.random() * agents.length)];
    
    // Flash the agent
    const flash = svg.append("circle")
      .attr("cx", agent.x)
      .attr("cy", agent.y)
      .attr("r", 8)
      .attr("fill", "none")
      .attr("stroke", "var(--color-primary)")
      .attr("stroke-width", 2)
      .attr("opacity", 1);
    
    flash.transition()
      .duration(500)
      .attr("r", 20)
      .attr("opacity", 0)
      .on("end", function() {
        flash.remove();
        // Share discovery
        setTimeout(transferKnowledge, 200);
      });
  }
  
  // Pulse the memory periodically
  function pulseMemory() {
    const pulse = svg.append("circle")
      .attr("cx", centerX)
      .attr("cy", centerY)
      .attr("r", memoryRadius)
      .attr("fill", "none")
      .attr("stroke", "var(--color-primary)")
      .attr("stroke-width", 1)
      .attr("opacity", 0.6);
    
    pulse.transition()
      .duration(2000)
      .attr("r", memoryRadius + 20)
      .attr("opacity", 0)
      .on("end", function() {
        pulse.remove();
      });
  }
  
  // Start animations
  const discoveryInterval = setInterval(makeDiscovery, 2500);
  const pulseInterval = setInterval(pulseMemory, 4000);
  transferKnowledge(); // Start with one transfer
  
  // Clean up
  window.addEventListener('beforeunload', () => {
    clearInterval(discoveryInterval);
    clearInterval(pulseInterval);
  });
});
</script>
