<!-- Lightbox Modal -->
<div class="ai-lightbox" id="ai-lightbox">
  <div class="ai-lightbox-overlay"></div>
  <div class="ai-lightbox-content">
    <button class="ai-lightbox-close" aria-label="Close">&times;</button>
    <img class="ai-lightbox-image" src="" alt="">
    <div class="ai-lightbox-prompt"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const galleryItems = document.querySelectorAll('.ai-gallery-item');
  const lightbox = document.getElementById('ai-lightbox');
  const lightboxImage = lightbox.querySelector('.ai-lightbox-image');
  const lightboxPrompt = lightbox.querySelector('.ai-lightbox-prompt');
  const lightboxClose = lightbox.querySelector('.ai-lightbox-close');
  const lightboxOverlay = lightbox.querySelector('.ai-lightbox-overlay');
  
  // Open lightbox
  galleryItems.forEach(item => {
    item.addEventListener('click', function() {
      const image = this.dataset.image;
      const prompt = this.dataset.prompt;
      
      lightboxImage.src = image;
      lightboxPrompt.textContent = prompt;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
      
      // Match prompt width to image width after image loads
      lightboxImage.onload = function() {
        lightboxPrompt.style.width = this.offsetWidth + 'px';
      };
    });
  });
  
  // Close lightbox
  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }
  
  lightboxClose.addEventListener('click', closeLightbox);
  lightboxOverlay.addEventListener('click', closeLightbox);
  
  // Close on escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && lightbox.classList.contains('active')) {
      closeLightbox();
    }
  });
});
</script>
