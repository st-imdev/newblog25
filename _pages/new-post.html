<div class="post-editor">
  <h1>New Post</h1>
  <p class="subtitle">Create a beautiful article for your blog</p>
  
  <form id="post-form">
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="Enter your post title..." required>
    </div>
    
    <div class="form-group">
      <label for="tags">Tags</label>
      <input type="text" id="tags" placeholder="technology, productivity, life (comma-separated)">
    </div>
    
    <div class="editor-container">
      <div class="editor-panel">
        <h3>Write</h3>
        <textarea id="content-editor" placeholder="Start writing your post in Markdown...

# Your heading here

Write your content here. You can use **bold**, *italic*, and other Markdown formatting.

## Subheading

- Lists work too
- As do [links](https://example.com)

> Blockquotes for emphasis

`Inline code` and code blocks are supported."></textarea>
      </div>
      
      <div class="editor-panel">
        <h3>Preview</h3>
        <div class="preview-panel">
          <div id="preview-content" class="preview-content">
            <p><em>Your preview will appear here as you type...</em></p>
          </div>
        </div>
      </div>
    </div>
    
    <div class="publish-section">
      <div class="form-group secret-input">
        <input type="password" id="secret" placeholder="Enter your secret to publish" required>
      </div>
      
      <button type="submit" class="publish-btn" id="publish-btn">

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  const titleEl = document.getElementById('title');
  const tagsEl = document.getElementById('tags');
  const contentEl = document.getElementById('content-editor');
  const previewEl = document.getElementById('preview-content');
  const secretEl = document.getElementById('secret');
  const publishBtn = document.getElementById('publish-btn');
  const statusEl = document.getElementById('status');
  const form = document.getElementById('post-form');
  
  // Configure marked for better rendering
  marked.setOptions({
    breaks: true,
    gfm: true
  });
  
  // Live preview update
  function updatePreview() {
    const content = contentEl.value.trim();
    if (!content) {
      previewEl.innerHTML = '<p><em>Your preview will appear here as you type...</em></p>';
      return;
    }
    
    try {
      const html = marked.parse(content);
      previewEl.innerHTML = html;
    } catch (error) {
      previewEl.innerHTML = '<p><em>Error rendering preview...</em></p>';
    }
  }
  
  // Update preview as user types
  contentEl.addEventListener('input', updatePreview);
  
  // Handle form submission
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const title = titleEl.value.trim();
    const tags = tagsEl.value.trim();
    const content = contentEl.value.trim();
    const secret = secretEl.value.trim();
    
    if (!title || !content || !secret) {
      showStatus('Please fill in title, content, and secret', 'error');
      return;
    }
    
    publishBtn.disabled = true;
    showStatus('Publishing your post...', 'loading');
    
    try {
      const response = await fetch('/.netlify/functions/add-post', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-secret': secret
        },
        body: JSON.stringify({
          title,
          tags,
          content
        })
      });
      
      const result = await response.text();
      
      if (response.ok) {
        showStatus('Post published successfully! Site is rebuilding...', 'success');
        // Clear form after successful publish
        titleEl.value = '';
        tagsEl.value = '';
        contentEl.value = '';
        secretEl.value = '';
        updatePreview();
      } else {
        showStatus(`Error: ${result}`, 'error');
      }
    } catch (error) {
      showStatus(`Error: ${error.message}`, 'error');
    } finally {
      publishBtn.disabled = false;
    }
  });
  
  function showStatus(message, type) {
    statusEl.textContent = message;
    statusEl.className = `status-message status-${type}`;
    statusEl.style.display = 'block';
    
    if (type === 'success') {
      setTimeout(() => {
        statusEl.style.display = 'none';
      }, 5000);
    }
  }
  
  // Initialize preview
  updatePreview();
})();
</script>
