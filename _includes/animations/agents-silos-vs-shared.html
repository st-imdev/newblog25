<!-- Agents in Silos vs Shared Memory Animation -->
<div id="silos-animation" style="margin: 2rem 0; position: relative; width: 100%; padding-bottom: 50%; overflow: hidden;">
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const container = d3.select("#silos-animation > div");
  if (!container.node()) return;
  
  const rect = container.node().getBoundingClientRect();
  const width = rect.width;
  const height = rect.height;
  
  const svg = container.append("svg")
    .attr("width", width)
    .attr("height", height)
    .attr("viewBox", `0 0 ${width} ${height}`)
    .attr("preserveAspectRatio", "xMidYMid meet");
  
  // Left side - Isolated agents
  const leftGroup = svg.append("g")
    .attr("transform", `translate(${width * 0.25}, ${height / 2})`);
  
  // Right side - Connected agents
  const rightGroup = svg.append("g")
    .attr("transform", `translate(${width * 0.75}, ${height / 2})`);
  
  // Title labels
  svg.append("text")
    .attr("x", width * 0.25)
    .attr("y", 30)
    .attr("text-anchor", "middle")
    .attr("font-family", "var(--font-ui)")
    .attr("font-size", "14px")
    .attr("fill", "var(--color-tx-muted)")
    .text("ISOLATED AGENTS");
  
  svg.append("text")
    .attr("x", width * 0.75)
    .attr("y", 30)
    .attr("text-anchor", "middle")
    .attr("font-family", "var(--font-ui)")
    .attr("font-size", "14px")
    .attr("fill", "var(--color-tx-muted)")
    .text("SHARED MEMORY");
  
  // Create isolated agents (left side)
  const siloAgents = [];
  const agentCount = 4;
  const radius = Math.min(width * 0.15, height * 0.3);
  
  for (let i = 0; i < agentCount; i++) {
    const angle = (i / agentCount) * 2 * Math.PI - Math.PI / 2;
    const x = radius * Math.cos(angle);
    const y = radius * Math.sin(angle);
    
    // Agent circle
    leftGroup.append("circle")
      .attr("cx", x)
      .attr("cy", y)
      .attr("r", 20)
      .attr("fill", "var(--color-bg-secondary)")
      .attr("stroke", "var(--color-tx-muted)")
      .attr("stroke-width", 1);
    
    // Agent label
    leftGroup.append("text")
      .attr("x", x)
      .attr("y", y + 4)
      .attr("text-anchor", "middle")
      .attr("font-size", "12px")
      .attr("fill", "var(--color-tx-normal)")
      .text("A" + (i + 1));
    
    siloAgents.push({ x, y, knowledge: [] });
  }
  
  // Create connected agents with shared memory (right side)
  const connectedAgents = [];
  
  // Central memory
  rightGroup.append("circle")
    .attr("cx", 0)
    .attr("cy", 0)
    .attr("r", 25)
    .attr("fill", "var(--color-action)")
    .attr("opacity", 0.2);
  
  rightGroup.append("text")
    .attr("x", 0)
    .attr("y", 4)
    .attr("text-anchor", "middle")
    .attr("font-size", "10px")
    .attr("font-weight", "bold")
    .attr("fill", "var(--color-action)")
    .text("MEMORY");
  
  // Connected agents
  for (let i = 0; i < agentCount; i++) {
    const angle = (i / agentCount) * 2 * Math.PI - Math.PI / 2;
    const x = radius * Math.cos(angle);
    const y = radius * Math.sin(angle);
    
    // Connection to memory
    rightGroup.append("line")
      .attr("x1", 0)
      .attr("y1", 0)
      .attr("x2", x)
      .attr("y2", y)
      .attr("stroke", "var(--color-tx-muted)")
      .attr("stroke-width", 1)
      .attr("opacity", 0.3);
    
    // Agent circle
    rightGroup.append("circle")
      .attr("cx", x)
      .attr("cy", y)
      .attr("r", 20)
      .attr("fill", "var(--color-bg-secondary)")
      .attr("stroke", "var(--color-action)")
      .attr("stroke-width", 1);
    
    // Agent label
    rightGroup.append("text")
      .attr("x", x)
      .attr("y", y + 4)
      .attr("text-anchor", "middle")
      .attr("font-size", "12px")
      .attr("fill", "var(--color-tx-normal)")
      .text("A" + (i + 1));
    
    connectedAgents.push({ x, y });
  }
  
  // Animation: Show isolated agents repeating same mistakes
  function animateIsolatedProblem() {
    const problemIndex = Math.floor(Math.random() * siloAgents.length);
    const agent = siloAgents[problemIndex];
    
    // Error indicator
    const error = leftGroup.append("text")
      .attr("x", agent.x)
      .attr("y", agent.y - 30)
      .attr("text-anchor", "middle")
      .attr("font-size", "16px")
      .attr("fill", "var(--color-re)")
      .attr("opacity", 0)
      .text("✗");
    
    error.transition()
      .duration(500)
      .attr("opacity", 1)
      .transition()
      .duration(1000)
      .attr("opacity", 0)
      .remove();
  }
  
  // Animation: Show connected agents sharing solutions
  function animateSharedSolution() {
    const solverIndex = Math.floor(Math.random() * connectedAgents.length);
    const solver = connectedAgents[solverIndex];
    
    // Success indicator
    const success = rightGroup.append("text")
      .attr("x", solver.x)
      .attr("y", solver.y - 30)
      .attr("text-anchor", "middle")
      .attr("font-size", "16px")
      .attr("fill", "var(--color-gr)")
      .attr("opacity", 0)
      .text("✓");
    
    success.transition()
      .duration(500)
      .attr("opacity", 1);
    
    // Share to memory
    const particle = rightGroup.append("circle")
      .attr("cx", solver.x)
      .attr("cy", solver.y)
      .attr("r", 3)
      .attr("fill", "var(--color-action)")
      .attr("opacity", 0.8);
    
    particle.transition()
      .duration(1000)
      .attr("cx", 0)
      .attr("cy", 0)
      .on("end", function() {
        particle.remove();
        success.remove();
        
        // Pulse memory
        rightGroup.append("circle")
          .attr("cx", 0)
          .attr("cy", 0)
          .attr("r", 25)
          .attr("fill", "none")
          .attr("stroke", "var(--color-action)")
          .attr("stroke-width", 2)
          .attr("opacity", 0.6)
          .transition()
          .duration(500)
          .attr("r", 40)
          .attr("opacity", 0)
          .remove();
      });
  }
  
  // Run animations
  setInterval(animateIsolatedProblem, 2000);
  setInterval(animateSharedSolution, 3000);
  
  // Handle resize
  window.addEventListener('resize', () => {
    const newRect = container.node().getBoundingClientRect();
    svg.attr("width", newRect.width)
       .attr("height", newRect.height)
       .attr("viewBox", `0 0 ${newRect.width} ${newRect.height}`);
  });
});
</script>
